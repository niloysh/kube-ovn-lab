apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-middlebox
  namespace: red
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: app-middlebox
  template:
    metadata:
      labels:
        app: app-middlebox
      annotations:
        k8s.v1.cni.cncf.io/networks: red/attachnet1, red/attachnet2
        attachnet1.red.ovn.kubernetes.io/logical_switch: attachnet1-red
        attachnet1.red.ovn.kubernetes.io/ip_address: 172.30.1.3
        attachnet2.red.ovn.kubernetes.io/logical_switch: attachnet2-red
        attachnet2.red.ovn.kubernetes.io/ip_address: 172.30.2.3
    spec:
      containers:
      - name: netshoot
        image: nicolaka/netshoot
        command: ["/bin/sh", "-c", "sysctl -w net.ipv4.ip_forward=1 && sleep infinity"]
        securityContext:
          privileged: true