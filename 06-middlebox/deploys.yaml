apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-a
  namespace: red
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: app-a
  template:
    metadata:
      labels:
        app: app-a
      annotations:
        k8s.v1.cni.cncf.io/networks: red/attachnet1
        attachnet1.red.ovn.kubernetes.io/logical_switch: attachnet1-red
        attachnet1.red.ovn.kubernetes.io/ip_address: 172.30.1.2
        # send multus traffic to its gateway
        attachnet1.red.ovn.kubernetes.io/routes: '[{"dst":"172.30.0.0/16","gw":"172.30.1.1"}]'
    spec:
      containers:
        - name: netshoot
          image: nicolaka/netshoot
          command: ["sleep", "infinity"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-b
  namespace: red
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: app-b
  template:
    metadata:
      labels:
        app: app-b
      annotations:
        k8s.v1.cni.cncf.io/networks: red/attachnet2
        attachnet2.red.ovn.kubernetes.io/logical_switch: attachnet2-red
        attachnet2.red.ovn.kubernetes.io/ip_address: 172.30.2.2
        attachnet2.red.ovn.kubernetes.io/routes: '[{"dst":"172.30.0.0/16","gw":"172.30.2.1"}]'
        
    spec:
      containers:
        - name: netshoot
          image: nicolaka/netshoot
          command: ["sleep", "infinity"]