apiVersion: v1
kind: Pod
metadata:
  name: red-pod-a
  namespace: red
  annotations:
    k8s.v1.cni.cncf.io/networks: red/lan
spec:
  nodeName: rke2-02
  containers:
  initContainers:
    - name: add-lab-route
      image: nicolaka/netshoot
      command:
        - /bin/sh
        - -c
        - |
          ip route add 129.97.168.0/24 via 10.10.10.1 dev net1 || true
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
    - name: netshoot
      image: nicolaka/netshoot
      command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Pod
metadata:
