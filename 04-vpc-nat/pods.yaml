apiVersion: v1
kind: Pod
metadata:
  name: red-pod
  namespace: red
  annotations:
    k8s.v1.cni.cncf.io/networks: red/attachnet
    attachnet.red.ovn.kubernetes.io/ip_address: 172.30.0.2
spec:
  initContainers:
    - name: setup-routing
      image: nicolaka/netshoot
      securityContext:
        capabilities:
          add: ["NET_ADMIN"]
      command:
        - sh
        - -c
        - |
          set -eux

          ip -o -4 addr show dev net1
          ip -o -4 addr show dev net1 | grep -q '172.30.0.2/24'

          ip rule add from 172.30.0.2/32 table 100
          ip route add 172.30.0.0/24 dev net1 scope link table 100
          ip route add default via 172.30.0.254 dev net1 table 100

          echo "=== ip addr ==="
          ip -o -4 addr show
          echo "=== ip rule ==="
          ip rule show
          echo "=== table 100 ==="
          ip route show table 100
  containers:
    - name: netshoot
      image: nicolaka/netshoot
      command: ["sleep", "infinity"]